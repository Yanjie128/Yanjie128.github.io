# Welcome to Jekyll!

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Site Settings
locale: "zh-CN"
title: "Eyengeol Site"
title_separator: "-"
name: "Mi Yanjie"
description: "Personal website and blog for Mi Yanjie, covering engineering, backend development, AI, and learning notes."
url: "https://yanjie128.github.io"
baseurl:
repository: "Yanjie128/Yanjie128.github.io"
teaser:
logo:
masthead_title:
breadcrumbs: true
words_per_minute: 220
enable_copy_code_button: true
copyright:
copyright_url:

comments:
  provider:

atom_feed:
  path:
  hide: false

search: true
search_full_content: true
search_provider: lunr
lunr:
  search_within_pages: true

# SEO
google_site_verification:
bing_site_verification:
naver_site_verification:
yandex_site_verification:
baidu_site_verification:
og_image: "/assets/avatar.png"

social:
  type: Person
  name: "Mi Yanjie"
  links:
    - "https://github.com/Yanjie128"

# Analytics
analytics:
  provider:

# Site Author
author:
  name: "Mi Yanjie"
  avatar: "/assets/avatar.png"
  bio: "EE undergraduate, incoming graduate student, and builder focused on backend engineering, tools, and AI."
  location: "China"
  email: "yli413241@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Yanjie128"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yli413241@gmail.com"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Yanjie128"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yli413241@gmail.com"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - node_modules
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: "Asia/Shanghai"

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: false
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
